# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version.json with deploy info
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MAJOR=$(node -e "try{const v=require('./version.json');const p=(v.version||'1.0.0').split('.');console.log(p[0]||'1');}catch(e){console.log('1');}")
          MINOR=$(node -e "try{const v=require('./version.json');const p=(v.version||'1.0.0').split('.');console.log(p[1]||'0');}catch(e){console.log('0');}")
          VERSION="${MAJOR}.${MINOR}.${BUILD_NUMBER}"
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "buildNumber": ${BUILD_NUMBER},
            "buildTime": "${BUILD_TIME}"
          }
          EOF
          echo "Stamped version.json → v${VERSION} deployed at ${BUILD_TIME}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
